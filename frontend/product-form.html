<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Produto</title>

<link rel="stylesheet" href="assets/css/global.css">
<link rel="stylesheet" href="assets/css/product-form.css">

</head>

<body>

<div class="navbar">
   <span>🛒 Painel Admin</span>
</div>

<div class="container">

<div class="card">

<h2>Produto</h2>

<input class="input" id="nome" placeholder="Nome">

<textarea
class="input"
id="descricao"
placeholder="Descrição">
</textarea>

<select class="input" id="categoria">

<option value="">
Selecione um Carro
</option>

<option value="Eletrônicos">
Nissan
</option>

<option value="Informática">
Mazda
</option>

<option value="Roupas">
Toyota
</option>

<option value="Livros">
Honda
</option>

<option value="Jogos">
Mitsubishi
</option>

<option value="Celulares">
Subaru
</option>

</select>

<input class="input" id="preco" placeholder="Preço">

<input class="input" id="quantidade" placeholder="Quantidade">

<label>Imagem do Produto</label>
<input
   class="input"
   type="file"
   id="imagem"
   accept="image/*"
/>
<img
   id="preview"
   style="
       width:200px;
       margin-top:10px;
       display:none;
       border-radius:8px;
   "
/>

<button
class="btn"
onclick="saveProduct()">

Salvar Produto

</button>

</div>

</div>

<script src="assets/js/products.js"></script>

</body>

</html>

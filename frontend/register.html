<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Cadastro</title>
    <link rel="stylesheet" href="assets/css/global.css" />
    <link rel="stylesheet" href="assets/css/register.css" />
  </head>
  <body>
    <div class="navbar">
      <span>🛒 E-commerce</span>
    </div>
    <div class="container">
      <div class="card">
        <h2>Criar conta</h2>
        <input class="input" id="nomeCompleto" placeholder="Nome Completo" />
        <input class="input" id="nomeUsuario" placeholder="Nome de Usuário" />
        <input class="input" id="email" placeholder="Email" />
        <input class="input" id="cpf" placeholder="CPF" />
        <input
          class="input"
          id="senha"
          type="password"
          placeholder="Senha | Nova senha"
        />
        <select class="input" id="role">
          <option value="admin">Administrador</option>
          <option value="cliente">Cliente</option>
        </select>
        <button class="btn" onclick="register()">Cadastrar</button>
      </div>
    </div>
    <script src="assets/js/user.js"></script>
  </body>
</html>
